# .github/workflows/lint_soar_app.yml

name: Lint SOAR App Connector

on:
  push:
    branches:
      - soar_apps
    paths:
      - 'apps/**/*.tgz'

jobs:
  lint-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out soar_apps branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install linter and helper deps
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint connector in newly added .tgz
        run: |
          # this script will locate the .tgz and run flake8 on the connector file
          python scripts/lint_connector.py apps/**/*.tgz

      - name: Create Pull Request to main
        if: ${{ success() }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(lint): connector lint passed'
          branch: main
          base: main
          title: 'Automated Lint Pass for ${{ github.sha }}'
          body: |
            The connector file inside the updated .tgz has passed linting.
            Merging `soar_apps` → `main`.
